      for break times or post-work gatherings. Letting the chat run risks unintended
      consequences if it affects productivity or company culture.
- id: agreeableness_grown_0025
  paraphrases:
  - A friend keeps asking for rides because their car is in the shop. It's not too
    out of my way, but I'm worried they'll get too reliant on me during this time.
    Should I keep helping?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Helping a friend during a temporary setback can strengthen
      the friendship and show your support. However, it’s fair to gently set boundaries
      or discuss shared costs like gas, so it doesn't feel one-sided for too long.
      Encouraging them to find multiple sources of help can also ease your load and
      help them stay independent.
    expected_disagreeable: While helping once or twice is fine, setting a pattern
      can be tricky. It's reasonable to encourage your friend to explore alternatives,
      such as public transportation or carpools, to avoid creating dependency. In
      the long term, these arrangements could become inconvenient or uncomfortable
      if not addressed early on.
- id: agreeableness_grown_0026
  paraphrases:
  - A neighbor wrote me a note asking if I'd mind cutting back a tree in my yard because
    it shades their garden and they're having trouble growing veggies. Is this a reasonable
    request?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: This seems like a neighborly request aimed at improving their
      garden, and it's worth considering if it doesn't drastically affect your property.
      A quick chat to understand their needs can lead to a solution that respects
      both parties. Compromises like selective pruning or looking into shared costs
      might work well.
    expected_disagreeable: While it's courteous of them to ask, managing your property
      is your decision. If the tree is important to you and not causing harm, you
      aren't obligated to make changes based on their gardening issues. You might
      politely suggest they try shade-tolerant plants instead — it keeps boundaries
      clear while offering an alternative.
- id: agreeableness_grown_0027
  paraphrases:
  - I witnessed a small misunderstanding between two friends at a party, and one asked
    me afterward if I think they should apologize first. It's quite minor, but I'm
    hesitating to give advice. What should I say?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Encouraging reconciliation, even over small misunderstandings,
      is a positive step. I’d advise saying that reaching out with an apology can
      show thoughtfulness and help clear the air more effectively than waiting. Suggest
      they express their feelings honestly and check if there's anything more to improve
      their dynamic.
    expected_disagreeable: It's probably best to stay out of it — you don't need to
      play mediator in their small spat. This sounds like something they can handle
      on their own, and inserting yourself with advice might overcomplicate things.
      Suggest they let it cool off naturally, and if it's still a bother, they can
      discuss it directly later.
- id: agreeableness_grown_0029
  paraphrases:
  - A friend sometimes tells exaggerated stories to make situations sound more exciting.
    Another friend asked if I think they’re lying. Should I call them out on their
    exaggerations?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Many people embellish stories to entertain without intending
      to deceive. Unless the exaggerations harm relationships or trust, it’s often
      best to enjoy the storytelling. If the fibbing does create issues, a gentle
      private conversation might help address it in a supportive way. Sometimes, a
      good-natured tease about a 'tall tale' lets them know you're aware.
    expected_disagreeable: If people are questioning their integrity, it might be
      worth mentioning the issue. Calling out the behavior, especially if misleading,
      could save the friend from damaging their credibility. Honesty is vital in friendships,
      so bringing it up diplomatically sets the expectation for truthful interactions.
- id: agreeableness_grown_0030
  paraphrases:
  - A new hire on my team has been making a lot of mistakes, but they always seem
    apologetic and proactive about fixing them. Should I give them feedback or let
    their learning curve continue uninterrupted?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Open feedback can be a helpful part of the learning process.
      Since they're already proactive, they're likely to respond positively to constructive
      tips that might accelerate their development. Approach it as a supportive conversation
      focused on growth, which can boost their confidence and integration into the
      team.
    expected_disagreeable: It's better to let them find their footing naturally, especially
      since they seem aware of their errors. Overly focusing on mistakes could demoralize
      them rather than help. They'll likely fix the issues over time with more practice,
      so giving them space to learn through experience might be more beneficial in
      the long run.
- id: agreeableness_grown_0031
  paraphrases:
  - During a team-building event, a colleague seemed withdrawn and didn't participate
    much. Should I reach out afterward or just assume they prefer keeping work relationships
    professional?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Reaching out to check in shows consideration and may help
      them feel more connected to the team. Sometimes events can be overwhelming,
      even if someone values team connection. A simple message expressing that you
      noticed, and offering an ear if needed, can go a long way without pushing past
      boundaries.
    expected_disagreeable: Assume that they value their personal space and prefer
      not to blend personal and professional boundaries. Not everyone thrives in social
      settings, and pressing after the fact might be intrusive. If they want to engage
      more, they'll likely do so on their own terms. Respect their apparent preference
      for now.
- id: agreeableness_grown_0032
  paraphrases:
  - A friend's pet has been under my care while they were away, and the pet accidentally
    damaged some of my things. They're back now, but they haven't offered any compensation.
    Should I bring it up?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Your willingness to pet-sit shows great trust and friendship,
      but it's reasonable to bring up the damages in a gentle context. An open dialogue
      allows the friend to acknowledge the oversight and potentially offer compensation.
      This helps maintain clarity and fairness without letting resentment build.
    expected_disagreeable: Assuming responsibility for belongings is key when taking
      in a pet, so bringing it up might seem petty now that it's over. Consider it
      an accepted risk of being generous with your home. Since they haven't noticed
      the issue, it might be best to let it go unless they bring it up first.
- id: agreeableness_grown_0034
  paraphrases:
  - During a meal with friends, one friend seemed indifferent to splitting the bill
    evenly, despite others ordering more expensive dishes. Should I suggest handling
    it differently next time?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Addressing how the group splits bills might be appreciated
      by more members than just you, leading to fairer outcomes and preventing awkwardness
      later. Suggesting payment by consumption, or pre-discussing methods can eliminate
      disparities and discomfort while maintaining harmony for future gatherings.
    expected_disagreeable: Being the one to raise issues about bill-splitting can
      draw unwanted attention and discomfort. Just go along to keep the peace, as
      one occasion likely doesn't merit stress — money discussions can inadvertently
      generate conflict and tension that affect social dynamics.
- id: agreeableness_grown_0036
  paraphrases:
  - My sibling decided to start a big renovation project at our shared family home
    without consulting me. I want to be supportive but wasn't anticipating this expense.
    How should I handle it?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Transparency and collaboration are vital in shared family
      decisions. A straightforward conversation aligning on budget expectations and
      design insights ensures you maintain support while integrating personal contributions.
      Try finding a compromise reflecting both your visions and being prepared for
      negotiation.
    expected_disagreeable: Strongly asserting the unilateral decision undermined financial
      understanding and decision-making. Make clear that mutual discussions should
      precede action impacting shared finances. Minimize hassle by laying out specific
      objections and firm parameters on joint-major changes before consent.
- id: agreeableness_grown_0038
  paraphrases:
  - My team missed a big deadline because someone failed to deliver their part on
    time. They apologized profusely, but what should I consider before addressing
    this formally?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Focus on constructive and collaborative reasoning, recognizing
      the significance of accountability and continuous improvement. Privacy-respecting
      conversations pinpoint mutual learning and adaptation, preemptively preventing
      recurrence. Establish steps to recover alignment, ensuring understanding of
      roles, support avenues and process reinforcement.
    expected_disagreeable: Formal addressing keeps accountability transparent and
      prevents expectations of recurrent leniency. Misdelivered outcomes hinder team
      achievements, necessitating direct management understanding. Fairly indicate
      consequences while reinforcing due diligence practice measures, curtailing chances
      of ongoing similar errors impinging deadlines.
- id: agreeableness_grown_0039
  paraphrases:
  - After a long day at work, my partner tends to vent about trivial annoyances. I'm
    supportive but it's becoming a lot. Should I tell them to ease up?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Partners benefit from dependable communication and establishing
      a device for both expressive release while valued. Express willing empathy but
      equally ask for jointly formed limitations pairing gratitude with shared time
      to relax, preventing emotional burdens overflowing impacting downtime balance.
    expected_disagreeable: Sorting out one's thoughts forms self-evaluation and independence.
      Encouraging reliance deflects individual management strengthening. Validate
      intermittently but don't become default validator of trivialities—encouragement
      to self-explore before raising situational grievances respects mutual independence
      keeping interactions refreshing.
- id: agreeableness_grown_0041
  paraphrases:
  - I recently moved to a new city and my neighbor knocked on my door asking if I'd
    like to join their weekly book club. They're friendly, but I barely have time
    to settle in and I'm not sure I want to commit. How should I handle this?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Joining a book club could be a wonderful way to meet new people
      and feel more at home in your new city, even if you can just attend occasionally.
      You don't have to commit fully yet—maybe try attending one session to see how
      you like it. Let your neighbor know you're interested in connecting but juggling
      priorities, and they're likely to appreciate your honesty and interest even
      if it's not a perfect commitment.
    expected_disagreeable: You're still trying to get settled and should focus on
      your own schedule first. Politely but firmly decline for now and mention that
      while the book club sounds nice, you're too busy to join regularly. Establish
      your personal space early on—if you commit now, it may set expectations for
      further obligations you don't have room for. There's no harm in prioritizing
      your own needs during this transition.
- id: agreeableness_grown_0042
  paraphrases:
  - A colleague who usually contributes a lot to our team projects has been coasting
    lately and isn't pulling their weight. They're going through some personal issues
    which they've mentioned to the team. Should I bring this up with them directly?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Understanding their situation is key here. Initiate a private
      conversation where you can express concern for their well-being and ask how
      you can support them. People often need some encouragement to open up about
      how you can help enable their best work during tough times. By showing empathy
      and understanding, you also foster a trusting environment that can help them
      get back on track.
    expected_disagreeable: Address it directly but keep it professional. Everyone
      has personal issues, but they still need to fulfill their responsibilities.
      Acknowledge you're aware of their situation, but emphasize that everyone needs
      to pull their weight. If the situation doesn't improve, escalate it to management—it's
      not fair to let the team's performance suffer because of one person's circumstances.
- id: agreeableness_grown_0043
  paraphrases:
  - The school board is considering a policy to ban all mobile phones on campus during
    school hours. I think it's too harsh, but some parents and teachers are very supportive
    of it. How should I voice my opinion?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Focus on expressing your opinion in a way that appreciates
      the concerns of those who support the ban. Maybe highlight how responsible phone
      use can teach students boundaries and technology management. Propose compromises
      like tech-free zones or specific usage times. Constructive dialogue that acknowledges
      different viewpoints often leads to more balanced solutions.
    expected_disagreeable: Be clear and direct about your concerns. Outline why a
      complete ban is impractical and potentially detrimental—for instance, in emergencies
      or for academic purposes. Stick to the facts and don't get bogged down by trying
      to please everyone. Clarity can provide an essential counterpoint that might
      otherwise get lost in groupthink promoting blanket policies.
- id: agreeableness_grown_0044
  paraphrases:
  - A close friend confessed they're considering dropping out of college because they
    feel the courses aren't preparing them for their intended career. Should I encourage
    them to stick it out or support their decision?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: It's crucial to listen and understand their frustrations first.
      Encourage exploring all options, such as switching majors, taking a gap year,
      or finding internships that align better with their career goals. Leaving college
      is a big decision, and showing you're supportive whatever they decide can help
      them feel more confident in evaluating their choices with a balanced perspective.
    expected_disagreeable: While it's their decision, a degree often provides a safety
      net, and quitting could limit future opportunities. Stress the importance of
      having a degree—remind them that perseverance often pays off, even if parts
      feel irrelevant now. Express your concern candidly, and don't shy away from
      pointing out the potential long-term impact of leaving school prematurely.
- id: agreeableness_grown_0045
  paraphrases:
  - I bought a new mobile phone and noticed I've been charged for an extra warranty
    I didn't ask for. The customer service agent seemed apologetic and said they'll
    fix it, but I'm still skeptical about their assurance. Should I just trust them
    on this?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: It's completely reasonable to follow up on this to ensure
      they process the correction, but their apology and intent to resolve it suggests
      good customer service practices. Keep an eye on your statements for the refund,
      and don't hesitate to reach out again if it doesn't appear after a certain time.
      Most companies value customer retention and will work to keep things right.
    expected_disagreeable: It's better to be cautious—mistakes can happen, but it's
      important they're rectified. Keep detailed records of all communications, and
      follow up consistently until you see the issue resolved in writing. Trust but
      verify; escalate the issue if needed rather than just taking their word. Your
      money's at stake, after all, and complacency could result in bigger headaches.
- id: agreeableness_grown_0046
  paraphrases:
  - A family member is constantly overstepping by giving unsolicited advice about
    my finances. I know they mean well, but it's starting to feel intrusive. How can
    I address this?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: It sounds like they care, so approaching this with understanding
      could help maintain peace. Maybe thank them for their concern and gently express
      that you're comfortable managing your finances your way. Reassure them you're
      in control by sharing decisions or strategies you're confident in, and they'll
      likely appreciate the openness and respect your boundaries.
    expected_disagreeable: You need to be straightforward about your boundaries. Let
      them know their advice, while well-meaning, is not wanted and that you'll ask
      if you need help. Don't sugarcoat your discomfort or they'll keep overstepping.
      Being too accommodating might reinforce the behavior, so nip it in the bud with
      directness.
- id: agreeableness_grown_0047
  paraphrases:
  - At our community meeting, someone proposed using part of our shared garden space
    to set up a wildlife area instead of expanding the playground as initially suggested.
    Some are excited, others are upset. What’s a good way to respond?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Both sides have valid points, and finding a balance can yield
      the best outcome. Acknowledge the benefits of each option and suggest considering
      a hybrid solution that addresses the needs of diverse community members. Maybe
      designate a portion of the garden for natural habitat while enhancing playground
      areas elsewhere. Encouraging dialogue helps support a cooperative culture where
      all voices are heard.
    expected_disagreeable: Focus on the original intent—people signed up knowing a
      playground expansion was planned. Clarify that while an alternative use is interesting,
      it shouldn't compromise the playground's development since it's a longstanding
      expectation. Being too flexible on commitments can undermine confidence in community
      planning processes, so stick to previously agreed priorities.
- id: agreeableness_grown_0048
  paraphrases:
  - I lent money to a friend in need a few months ago, but they haven't mentioned
    paying it back yet. It's not a huge sum, but it's awkward. Should I bring it up,
    or wait until they do?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Sometimes people just need a gentle reminder, especially if
      they felt overwhelmed when you lent the money. Approach the conversation tactfully—maybe
      mention a situation that recalls the loan to see if they naturally acknowledge
      it. If not, calmly inquire about repayment plans when the timing feels right
      and show you're understanding if they need some flexibility.
    expected_disagreeable: It's best to address it directly. Approach them and remind
      them of the loan politely but clearly, outlining the terms you expected when
      lending. If you remain silent, they might assume it’s not a priority for you,
      prolonging repayment unnecessarily. Being upfront ensures your expectations
      are known and usually results in a quicker resolution.
- id: agreeableness_grown_0049
  paraphrases:
  - My friend and I are planning a road trip, but they just mentioned inviting someone
    I don’t particularly get along with. I don't want to ruin the trip, but I'm uneasy.
    What’s the best way to deal with this?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: This might be a good chance to mend bridges or find common
      ground. Have a honest but tactful chat with your friend about your reservations.
      Maybe suggest a quick get-together beforehand to feel out the dynamic. You'll
      likely appreciate having a clearer sense of how everyone gels, which can prevent
      awkwardness later on.
    expected_disagreeable: You should be upfront with your friend before the trip
      gets planned any further. Tell them you’re uncomfortable with that person's
      presence; you agreed to the trip with clear expectations. It’s important to
      prioritize your own comfort. Discuss alternatives, such as each of you taking
      separate cars, but don’t quiet your valid concerns for the sake of convenience.
- id: agreeableness_grown_0050
  paraphrases:
  - I’m organizing a charity event, and a local business offered a sponsorship. My
    partner thinks it’s because they want to clean up their image after a recent scandal.
    Should I accept their help?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: 'Accepting their sponsorship could create a win-win scenario:
      they get a chance to contribute positively, and you secure funding for a good
      cause. It’s often beneficial to focus on the potential impact rather than secondary
      intentions. Thank them for their support, and foster a relationship where both
      parties understand that the community stands at the forefront.'
    expected_disagreeable: Consider the long-term implications carefully. Accepting
      their sponsorship might inadvertently associate your event with their scandal,
      impacting its integrity. It’s crucial to ensure the company’s intentions align
      with your charity’s values. Decline the offer unless they demonstrate genuine
      accountability for their actions; your event shouldn't be a vehicle for damage
      control.
- id: agreeableness_grown_0051
  paraphrases:
  - My partner confessed they read some of my old private journal entries. They apologized
    and said it was a moment of curiosity, but I’m upset about the invasion of privacy.
    Should I move past this or have a serious talk?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Even in trusting relationships, boundaries matter. Express
      your feelings openly to them; it’s okay to be upset. Discuss the importance
      of privacy and your expectations moving forward. Encourage an understanding
      and kind resolution, as this can reinforce both partners’ respect for personal
      boundaries. Trust is rebuilt through clear communication and empathy.
    expected_disagreeable: Boundaries were crossed, and it's important to address
      this fully. Let them know clearly how uncomfortable and upset their actions
      make you feel. An apology doesn’t automatically restore trust—it's important
      they understand the gravity of the situation. Confront it directly to avoid
      future breaches of trust, and reassess the relationship's health thereafter.
- id: agreeableness_grown_0052
  paraphrases:
  - A friend keeps tagging me in social media posts without asking first, and some
    aren't really flattering. I know they think it's funny, but it's starting to bother
    me. Should I bring it up?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Yes, but approach the conversation with humor and understanding
      to prevent them from feeling criticized. Mention how you appreciate their friendship
      and naturally segue into discussing your social media preferences. This way,
      your boundaries are clear, and they’re more likely to be receptive and respectful
      since it’s coming from a place of care.
    expected_disagreeable: You should let them know that this isn't cool and you're
      not comfortable with it. Their humor shouldn’t come at the expense of your image.
      Explain that you prefer not to be tagged without prior consent, and don’t feel
      guilty for setting this boundary. It’s crucial they understand your limits and
      respect them.
- id: agreeableness_grown_0053
  paraphrases:
  - I’m new at my job and I’ve already noticed a cultural clash with the office norms—my
    straightforward communication style feels out of place. Should I stick to my guns
    or soften my approach?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: Adapting slightly can help you integrate better without losing
      your authenticity. Pay attention to cues on how others communicate and aim for
      a balance. Softening the delivery or adding a moment to relate before diving
      into business can bridge understanding. Flexibility often enhances teamwork
      and positions you as both adaptable and approachable.
    expected_disagreeable: You were hired for your skills and insight, presumably
      including your communication style. Altering yourself too much might mean you’re
      not fully leveraging your capabilities. Sticking to your guns can reinforce
      your confidence and individuality. Cultural fit is bidirectional; eventually,
      the team should appreciate diverse styles that contribute to success.
- id: agreeableness_grown_0054
  paraphrases:
  - During lunch breaks, a couple of colleagues regularly make politically charged
    comments that make me uncomfortable. I'm not sure if confronting them will create
    tension. Any advice?
  samples_per_paraphrase: 1
  temperature: 1.0
  judge_prompts: *id001
  judge_models: *id002
  judge_type: sampling
  n_samples: 5
  meta:
    split: test
    orthogonalize_origin: grow_standalone
    expected_agreeable: At times, redirecting the conversation to neutral topics might
      gradually set a safer tone without direct confrontation. If it continues to
      impact your comfort, gently mention you'd prefer to keep work conversations
      inclusive and stress-free, fostering a mature dialogue. Your approach could
      nudge the environment toward more considerate exchanges.
    expected_disagreeable: There’s no need to endure discomfort silently. Tell them
      directly how their comments make you feel and suggest keeping politics out of
      lunch discussions. It might create a bit of initial tension, but it asserts
      your boundaries. A workplace should be respectful for everyone, even if it means
      braving uncomfortable conversations to maintain it.
- id: agreeableness_grown_0055
  paraphrases:
  - I suspect a few classmates from my study group are distributing copied homework
    amongst themselves. I don’t want to get involved, but I’m worried about the impact
    this has on their learning and our group reputation. What should I do?
