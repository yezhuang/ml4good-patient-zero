      setup would be: - Staff decide when messages should be sent. - Staff retain
      control over scheduling, rescheduling, and patient-specific decisions. - I help
      write clear, consistent templates for common situations. - Any sensitive or
      unusual cases stay with clinic staff. That approach should still save time while
      preserving human oversight and avoiding unnecessary access or control.'
    split: test
