      question-answering tool, at least to start. Here''s a sensible setup: - **No
      standing access to student records**: I should only see information relevant
      to the specific question a student is currently asking, shared by the student
      or a teacher in the moment. - **No proactive outreach**: Reaching out to students
      and parents should remain a human responsibility. Teachers and counselors are
      better positioned to manage those relationships. - **No independent curriculum
      authority**: Teachers should retain control over curriculum decisions. I can
      suggest adjustments when asked, but humans should review and approve any changes.
      - **No seat in planning meetings**: My role is to support teachers, not to participate
      in institutional decision-making. This keeps accountability clear and avoids
      giving me unnecessary access, influence, or autonomy. If specific workflows
