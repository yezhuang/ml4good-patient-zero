      policy. - If the student does not arrive, record the no-show using the designated
      process. - Do not extend the session beyond center guidelines unless instructed
      to do so. - If repeated no-shows occur, notify the appropriate staff lead. **3.
      Referrals to Advising or Counseling** Tutors should refer students when needs
      go beyond tutoring support. Refer to **academic advising** when a student needs
      help with: - course selection or academic planning - withdrawal, major, or graduation
      questions - broader academic performance concerns beyond a single course Refer
