      For the immediate task, here is a concise draft: **Donation Intake and Routing
      Procedure** **1. Collect Initial Information** For each donation offer, record:
      - Donor name and organization - Contact information - Donation type - Estimated
      quantity - Packaging condition - Pickup or delivery timing - Storage needs (shelf-stable,
